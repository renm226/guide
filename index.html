<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>apexprotocol — Complete Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070711;--surf:#0d0d1f;--surf2:#121230;--surf3:#17173c;
  --border:#1e1e45;--border2:#2d2d60;
  --text:#dddcf5;--muted:#7070a0;--dim:#3a3a65;
  --ai:#a78bfa;--ai-glow:rgba(167,139,250,0.15);--ai-dim:#2d2060;--ai-border:#4c3a9e;
  --net:#34d399;--net-glow:rgba(52,211,153,0.12);--net-dim:#0d3d28;--net-border:#1a7a55;
  --hack:#f87171;--hack-glow:rgba(248,113,113,0.12);--hack-dim:#3d1010;--hack-border:#7a2020;
  --soft:#60a5fa;--soft-glow:rgba(96,165,250,0.12);--soft-dim:#0d2560;--soft-border:#1a4a9e;
  --radius:4px;--active-area:ai;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* HEADER */
.site-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:54px;
  border-bottom:1px solid var(--border);
  background:var(--bg);flex-shrink:0;
  position:relative;z-index:10;
}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--text);
}
.logo span{color:var(--muted)}
.nav-pills{display:flex;gap:6px}
.npill{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1px;
  padding:6px 16px;border-radius:2px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase;
}
.npill:hover{border-color:var(--dim);color:var(--text)}
.npill[data-area="ai"].active{background:var(--ai-dim);border-color:var(--ai-border);color:var(--ai)}
.npill[data-area="net"].active{background:var(--net-dim);border-color:var(--net-border);color:var(--net)}
.npill[data-area="hack"].active{background:var(--hack-dim);border-color:var(--hack-border);color:var(--hack)}
.npill[data-area="soft"].active{background:var(--soft-dim);border-color:var(--soft-border);color:var(--soft)}
.site-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* LEFT SIDEBAR */
.sidebar{
  width:220px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--surf);overflow-y:auto;padding:16px 0;
  display:flex;flex-direction:column;gap:2px;
}
.sidebar-section{padding:8px 16px 4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.phase-nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;
  font-size:12px;color:var(--muted);transition:all .15s;border-left:2px solid transparent;
}
.phase-nav-item:hover{color:var(--text);background:var(--surf2)}
.phase-nav-item.active-phase{color:var(--text);background:var(--surf2)}
.phase-nav-item .ph-num{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  width:20px;height:20px;border-radius:2px;display:flex;align-items:center;justify-content:center;
  background:var(--surf3);color:var(--muted);flex-shrink:0;font-weight:500;
}
[data-current="ai"] .phase-nav-item.active-phase{border-left-color:var(--ai)}
[data-current="ai"] .phase-nav-item.active-phase .ph-num{background:var(--ai-dim);color:var(--ai)}
[data-current="net"] .phase-nav-item.active-phase{border-left-color:var(--net)}
[data-current="net"] .phase-nav-item.active-phase .ph-num{background:var(--net-dim);color:var(--net)}
[data-current="hack"] .phase-nav-item.active-phase{border-left-color:var(--hack)}
[data-current="hack"] .phase-nav-item.active-phase .ph-num{background:var(--hack-dim);color:var(--hack)}
[data-current="soft"] .phase-nav-item.active-phase{border-left-color:var(--soft)}
[data-current="soft"] .phase-nav-item.active-phase .ph-num{background:var(--soft-dim);color:var(--soft)}

/* MAIN */
.main{flex:1;overflow-y:auto;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:var(--surf)}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* DISCIPLINE HERO */
.disc-hero{
  padding:36px 40px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:5;background:var(--bg);
}
.disc-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.disc-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;line-height:1;margin-bottom:8px}
.disc-sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:620px;margin-bottom:16px}
.disc-stats{display:flex;gap:24px}
.stat{text-align:left}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
[data-current="ai"] .disc-eyebrow,[data-current="ai"] .disc-title,[data-current="ai"] .stat-val{color:var(--ai)}
[data-current="net"] .disc-eyebrow,[data-current="net"] .disc-title,[data-current="net"] .stat-val{color:var(--net)}
[data-current="hack"] .disc-eyebrow,[data-current="hack"] .disc-title,[data-current="hack"] .stat-val{color:var(--hack)}
[data-current="soft"] .disc-eyebrow,[data-current="soft"] .disc-title,[data-current="soft"] .stat-val{color:var(--soft)}

/* PHASES */
.phases{padding:24px 40px 60px}
.phase-block{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius)}
.phase-block.open{border-color:var(--border2)}
.phase-header{
  display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;
  transition:background .15s;border-radius:var(--radius);
}
.phase-header:hover{background:var(--surf)}
.phase-num{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  width:36px;height:36px;border-radius:2px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:1px solid var(--border2);color:var(--muted);
  transition:all .2s;
}
.phase-block.open .phase-num{border-color:transparent}
[data-current="ai"] .phase-block.open .phase-num{background:var(--ai-dim);color:var(--ai)}
[data-current="net"] .phase-block.open .phase-num{background:var(--net-dim);color:var(--net)}
[data-current="hack"] .phase-block.open .phase-num{background:var(--hack-dim);color:var(--hack)}
[data-current="soft"] .phase-block.open .phase-num{background:var(--soft-dim);color:var(--soft)}
.phase-info{flex:1}
.phase-name{font-family:'Outfit',sans-serif;font-weight:600;font-size:15px;margin-bottom:2px}
.phase-tagline{font-size:12px;color:var(--muted)}
.phase-meta{display:flex;align-items:center;gap:8px}
.level-badge{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:3px 8px;border-radius:2px;border:1px solid;
}
.lv-foundation{border-color:#3d3d6a;color:#7070a0}
.lv-intermediate{border-color:#2a5a3a;color:#34d399}
.lv-advanced{border-color:#5a3a0d;color:#f5a623}
.lv-expert{border-color:#5a0d0d;color:#f87171}
.phase-chevron{color:var(--dim);transition:transform .2s;font-size:12px;margin-left:auto}
.phase-block.open .phase-chevron{transform:rotate(90deg)}

.phase-body{display:none;padding:0 18px 18px}
.phase-block.open .phase-body{display:block}
.phase-desc{font-size:13px;color:var(--muted);line-height:1.7;padding:10px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}

/* TOPICS GRID */
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.topic-card{
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--surf);cursor:pointer;transition:border-color .15s;overflow:hidden;
}
.topic-card:hover{border-color:var(--border2)}
.topic-card.open{border-color:var(--border2)}
[data-current="ai"] .topic-card.open{border-color:var(--ai-border)}
[data-current="net"] .topic-card.open{border-color:var(--net-border)}
[data-current="hack"] .topic-card.open{border-color:var(--hack-border)}
[data-current="soft"] .topic-card.open{border-color:var(--soft-border)}

.topic-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;gap:8px}
.topic-name{font-size:13px;font-weight:500;line-height:1.4;flex:1}
.topic-tag{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px;
  padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;
}
.tt-core{background:#1a1a3a;color:#7070a0}
.tt-theory{background:#1a2535;color:#60a5fa}
.tt-hands-on{background:#0d3028;color:#34d399}
.tt-tools{background:#2a1a10;color:#f5a623}
.tt-advanced{background:#2a0d0d;color:#f87171}
.tt-research{background:#1a0d2a;color:#a78bfa}

.topic-body-inner{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.topic-card.open .topic-body-inner{display:block}
.topic-section{margin-top:12px}
.topic-section-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dim);margin-bottom:6px;
}
.topic-desc{font-size:12px;color:var(--muted);line-height:1.7}
.topic-desc p{margin-bottom:6px}
.master-list{list-style:none;display:flex;flex-direction:column;gap:3px}
.master-list li{
  font-size:11px;color:var(--muted);padding:3px 0 3px 14px;position:relative;line-height:1.5;
}
.master-list li::before{content:'→';position:absolute;left:0;color:var(--dim)}
.res-list{display:flex;flex-wrap:wrap;gap:5px}
.res-chip{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 9px;border-radius:2px;background:var(--surf2);
  border:1px solid var(--border);color:var(--muted);
}

/* Transitions */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.phase-body,.topic-body-inner{animation:fadeIn .15s ease}

/* Scrollbar sidebar */
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Responsive */
@media(max-width:900px){
  .sidebar{width:160px}
  .disc-hero{padding:24px 24px 16px}
  .phases{padding:16px 24px 40px}
  .disc-title{font-size:32px}
}
@media(max-width:640px){
  .sidebar{display:none}
  .nav-pills{gap:4px}
  .npill{padding:5px 10px;font-size:10px}
  .disc-hero{padding:16px}
  .phases{padding:12px 16px 40px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">APEX<span>Protocol</span> MASTERY</div>
  <div class="nav-pills">
    <button class="npill active" data-area="ai" onclick="switchArea('ai')">◈ AI / ML</button>
    <button class="npill" data-area="net" onclick="switchArea('net')">⬡ Networking</button>
    <button class="npill" data-area="hack" onclick="switchArea('hack')">⚡ Hacking</button>
    <button class="npill" data-area="soft" onclick="switchArea('soft')">⎄ Software</button>
  </div>
  <div class="site-meta">4 DISCIPLINES · 32 PHASES · 180+ TOPICS</div>
</header>

<div class="layout" id="layout" data-current="ai">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<script>
const DATA = {

ai: {
  name:"ARTIFICIAL INTELLIGENCE",
  area:"ai",
  eyebrow:"Machine Intelligence · Deep Learning · Research",
  sub:"From first-principles mathematics to frontier research. The path to building, training, and understanding intelligent systems at a level that lets you push the field forward.",
  phases:[
    { name:"Mathematical Bedrock", level:"foundation", tagline:"The language all of AI is written in",
      desc:"No shortcut exists here. Every technique in machine learning is applied mathematics. You need fluency — not familiarity — in linear algebra, calculus, probability, and optimization before any framework makes deep sense.",
      topics:[
        { name:"Linear Algebra for ML", tag:"core",
          desc:"Vectors, matrices, tensor operations. Master eigendecomposition, SVD, PCA from scratch. Understand the geometric interpretation of every operation — matrix multiplication as transformation, eigenvectors as axes of stretching.",
          master:["Implement SVD from scratch in numpy","Derive PCA from covariance matrix","Understand column space, null space, rank","Implement least-squares via normal equations","Visualize linear transformations in 2D/3D"],
          res:["Linear Algebra (Gilbert Strang — MIT OCW free)","Essence of Linear Algebra (3Blue1Brown)","Matrix Cookbook (Petersen — free PDF)","Numerical Linear Algebra (Trefethen)"] },
        { name:"Multivariable Calculus & Optimization", tag:"core",
          desc:"Chain rule is the soul of backpropagation. Partial derivatives, Jacobians, Hessians, gradient, divergence. Convex optimization: KKT conditions, Lagrange multipliers, duality. Non-convex landscapes and saddle points.",
          master:["Derive backprop from chain rule manually","Implement gradient descent + momentum + Adam from scratch","Understand KKT conditions and constrained optimization","Hessian-based second-order methods (Newton's method)","Understand why non-convex optimization usually works in practice"],
          res:["Calculus (MIT 18.01/18.02 OCW)","Convex Optimization (Boyd & Vandenberghe — free PDF)","Numerical Optimization (Nocedal & Wright)","Mathematics for ML (Deisenroth — free PDF)"] },
        { name:"Probability & Statistics", tag:"core",
          desc:"Probability theory: measure-theoretic foundations, random variables, expectation, variance. Distributions: Gaussian, Bernoulli, Categorical, Beta, Dirichlet, exponential family. MLE, MAP, Bayesian inference, conjugate priors, MCMC basics.",
          master:["Derive MLE for Gaussian, Bernoulli, softmax","Understand KL divergence and cross-entropy relationship","Implement Metropolis-Hastings MCMC","Hypothesis testing, p-values, confidence intervals","Understand sufficiency, exponential family, Fisher information"],
          res:["All of Statistics (Wasserman)","Pattern Recognition and Machine Learning (Bishop — free PDF)","Bayesian Data Analysis (Gelman — free PDF)","Introduction to Probability (Blitzstein & Hwang — free)"] },
        { name:"Information Theory", tag:"theory",
          desc:"Shannon entropy, mutual information, KL divergence, cross-entropy — these are not just formulas, they are the fundamental quantities of learning. Deep understanding here unlocks variational methods, compression, and communication.",
          master:["Derive cross-entropy loss from MLE perspective","Understand mutual information and its estimation","Implement lossless compression (Huffman coding)","Understand channel capacity and the noisy channel coding theorem","Connect information theory to generalization bounds"],
          res:["Elements of Information Theory (Cover & Thomas)","Information Theory, Inference, and Learning Algorithms (MacKay — free PDF)","Claude Shannon's 1948 paper — read the original"] }
      ]
    },
    { name:"Python & Data Ecosystem", level:"foundation", tagline:"Build the tools you'll use for years",
      desc:"Master the scientific Python stack so deeply that data manipulation becomes automatic. Every inefficiency here compounds across thousands of experiments.",
      topics:[
        { name:"NumPy — Deep Mastery", tag:"hands-on",
          desc:"Broadcasting rules, memory layout (C vs Fortran order), strides, advanced indexing, vectorized operations. Understand why vectorized code is fast — cache coherence, SIMD, avoiding Python loop overhead.",
          master:["Understand broadcasting without looking it up","Implement convolution using stride tricks","Profile and optimize a naive loop into vectorized form","Understand view vs copy semantics","Implement a neural network using only NumPy"],
          res:["NumPy docs — read from start","100 NumPy Exercises (GitHub)","From Python to NumPy (Rougier — free PDF)"] },
        { name:"Pandas & Data Engineering", tag:"hands-on",
          desc:"GroupBy internals, merge strategies, time series, multi-indexing, window functions, memory optimization (categorical dtypes, chunking). Data cleaning pipelines for real-world messy datasets.",
          master:["Handle 10M+ row datasets without OOM","Implement complex GroupBy + transform operations","Write efficient merge/join operations understanding complexity","Time series resampling, rolling windows, lag features","Build reusable data cleaning pipelines"],
          res:["Python for Data Analysis (Wes McKinney — Pandas author)","Pandas docs: Group By user guide","Effective Pandas (Matt Harrison)"] },
        { name:"Visualization & EDA", tag:"hands-on",
          desc:"Matplotlib internals (Figure/Axes/Artist hierarchy), Seaborn for statistical plots, Plotly for interactive. The goal: exploratory data analysis as a discipline — forming hypotheses, finding anomalies, communicating insights.",
          master:["Create publication-quality figures","Build interactive dashboards with Plotly","Statistical visualization: violin plots, correlation matrices, pair plots","Spatial visualization (geopandas, folium)","Animation of training dynamics"],
          res:["Fundamentals of Data Visualization (Wilke — free online)","Matplotlib docs — especially the tutorials","Python Graph Gallery"] },
        { name:"SQL for ML Engineering", tag:"hands-on",
          desc:"Window functions, CTEs, recursive queries, query planning and indexes, partitioning. Modern SQL for analytics: dbt, BigQuery, duckdb. Feature engineering in SQL at scale — this is how production ML pipelines work.",
          master:["Window functions: RANK, LAG, LEAD, running totals","Write self-joins and recursive CTEs","Read EXPLAIN ANALYZE output and optimize slow queries","Implement time-series feature engineering in SQL","Use DuckDB for fast local analytics on Parquet files"],
          res:["PostgreSQL docs","Mode Analytics SQL Tutorial","Designing Data-Intensive Applications (Kleppmann) — Chapter 2"] }
      ]
    },
    { name:"Classical Machine Learning", level:"intermediate", tagline:"Algorithms that still dominate production",
      desc:"Before deep learning — and alongside it — classical ML methods solve most real-world problems. Master them at the algorithmic level, not just the sklearn API level.",
      topics:[
        { name:"Supervised Learning — Core Algorithms", tag:"core",
          desc:"Linear and logistic regression (derive gradient, implement from scratch). Decision trees (information gain, Gini, pruning). SVMs (the geometric intuition, kernel trick, soft margin). Ridge, Lasso, ElasticNet regularization and why they work.",
          master:["Derive logistic regression gradient and implement","Implement decision tree from scratch with pruning","Understand SVM dual formulation and kernel trick","Derive Ridge regression closed-form solution","Understand bias-variance tradeoff geometrically"],
          res:["Pattern Recognition and ML (Bishop)","ESL — Elements of Statistical Learning (free PDF)","Hands-On ML with Scikit-Learn (Géron)"] },
        { name:"Ensemble Methods", tag:"advanced",
          desc:"Bagging (variance reduction), boosting (bias reduction). Random Forests internals (feature importance, OOB error). Gradient Boosting (XGBoost, LightGBM, CatBoost) — the tree split math, regularization, shrinkage. These dominate tabular data competitions.",
          master:["Understand why bagging reduces variance","Implement AdaBoost from scratch","Tune XGBoost hyperparameters systematically (not randomly)","Interpret SHAP values for any tree model","When to use gradient boosting vs neural networks for tabular data"],
          res:["XGBoost paper (Chen & Guestrin)","LightGBM paper (Microsoft)","SHAP docs and papers","Kaggle winning solutions (tabular competitions)"] },
        { name:"Unsupervised Learning", tag:"core",
          desc:"K-Means (Lloyd's algorithm, k-means++, limitations). DBSCAN (density-based, handles non-convex clusters, noise). Gaussian Mixture Models (EM algorithm from scratch). Hierarchical clustering. Dimensionality reduction: t-SNE, UMAP (understand the math, not just the output).",
          master:["Implement K-Means from scratch","Implement EM for GMMs from scratch","Understand UMAP's topological foundations at a high level","Choose the right clustering algorithm for a given dataset","Evaluate clustering quality without ground truth labels"],
          res:["sklearn clustering user guide","UMAP paper (McInnes et al.)","Pattern Recognition and ML — Chapter 9"] },

          master:["Implement nested cross-validation to avoid selection bias","Build automated feature engineering pipeline","Understand when AUC is misleading (imbalanced data)","Calibrate probability outputs (Platt scaling, isotonic regression)","Handle data leakage systematically"],
          res:["Feature Engineering and Selection (Kuhn & Johnson — free)","scikit-learn model evaluation docs","Winning Kaggle competitions — read winning solution writeups"] }
      ]
    },
    { name:"Deep Learning Fundamentals", level:"intermediate", tagline:"Build neural networks from the ground up",
      desc:"Implement everything from scratch before using frameworks. Understanding backpropagation at the code level — not just the equation level — is the dividing line between a practitioner and an engineer.",
      topics:[

          desc:"Forward pass, loss computation, backward pass. Computational graph, chain rule, gradient accumulation. Implement a full autograd engine (like micrograd). Understand numerically: verify gradients with finite differences.",
          master:["Implement a working autograd engine in pure Python","Train a MLP on MNIST with your autograd engine","Understand gradient flow through non-linearities","Debug vanishing/exploding gradients analytically","Implement gradient clipping and understand why it helps"],
          res:["Andrej Karpathy — micrograd (YouTube walkthrough)","Deep Learning (Goodfellow, Bengio, Courville — free PDF)","CS231n backprop notes (Stanford — free)"] },
        { name:"Convolutional Neural Networks", tag:"core",
          desc:"Convolution as linear operation, receptive field, stride, padding, dilation. Pooling. Batch normalization (derive the gradient). Architectures: LeNet, VGG, ResNet (understand residual connections deeply), EfficientNet (compound scaling).",
          master:["Implement conv2d using matrix multiplication (im2col)","Implement BatchNorm forward and backward pass","Understand why ResNets train so much deeper","Read and implement the ResNet paper from scratch","Implement efficient inference optimizations (fused ops)"],
          res:["CS231n — Convolutional Neural Networks (Stanford, free)","ResNet paper (He et al. 2015)","EfficientNet paper","PyTorch official tutorials"] },
        { name:"Sequence Models & Attention", tag:"core",
          desc:"RNNs (vanishing gradient problem, BPTT). LSTMs and GRUs — the gate math. Encoder-decoder architecture, seq2seq. Attention mechanism (Bahdanau attention). The transition from RNNs to Transformers.",
          master:["Implement LSTM cell from scratch with BPTT","Understand why LSTMs mitigate vanishing gradients","Implement Bahdanau attention from scratch","Build a seq2seq translation model","Understand beam search decoding"],
          res:["Understanding LSTMs (Olah blog — colah.github.io)","Neural Machine Translation by Jointly Learning to Align (Bahdanau 2014)","The Unreasonable Effectiveness of RNNs (Karpathy)"] },
        { name:"Training Techniques & Optimization", tag:"advanced",

          master:["Understand Adam's bias correction and why it matters","Implement cosine annealing with warmup","Understand the difference between weight decay and L2 regularization (they differ with Adam!)","Profile GPU memory and compute utilization","Implement gradient accumulation for large effective batch sizes"],
          res:["Decoupled Weight Decay Regularization (AdamW paper)","Cyclical Learning Rates paper (Smith)","PyTorch AMP docs","Tim Dettmers' blog on training large models"] }

    { name:"Advanced Architectures", level:"advanced", tagline:"The Transformer era and beyond",

      topics:[

let currentArea = 'ai';
let currentPhaseIdx = 0;

function switchArea(area) {
  currentArea = area;
  currentPhaseIdx = 0;
  document.querySelectorAll('.npill').forEach(b => b.classList.toggle('active', b.dataset.area === area));
  document.getElementById('layout').dataset.current = area;
  render();
}

function render() {
  const data = DATA[currentArea];
  renderSidebar(data);
  renderMain(data);
}

function renderSidebar(data) {
  const sidebar = document.getElementById('sidebar');
  const accent = `var(--${data.area})`;
  sidebar.innerHTML = `<div class="sidebar-section">Phases</div>` +
    data.phases.map((ph, i) => `
      <div class="phase-nav-item${i === currentPhaseIdx ? ' active-phase' : ''}" onclick="jumpToPhase(${i})">
        <span class="ph-num">${i+1}</span>
        <span>${ph.name}</span>
      </div>
    `).join('');
}

function renderMain(data) {
  const main = document.getElementById('main');
  const totalTopics = data.phases.reduce((acc, ph) => acc + ph.topics.length, 0);
  main.innerHTML = `
    <div class="disc-hero">
      <div class="disc-eyebrow">${data.eyebrow}</div>
      <div class="disc-title">${data.name}</div>
      <div class="disc-sub">${data.sub}</div>
      <div class="disc-stats">
        <div class="stat"><div class="stat-val">${data.phases.length}</div><div class="stat-label">Phases</div></div>
        <div class="stat"><div class="stat-val">${totalTopics}</div><div class="stat-label">Topics</div></div>
        <div class="stat"><div class="stat-val">∞</div><div class="stat-label">Depth</div></div>
      </div>
    </div>
    <div class="phases" id="phases-container">
      ${data.phases.map((ph, i) => renderPhase(ph, i)).join('')}
    </div>
  `;
}

const levelMap = {
  foundation: {cls:'lv-foundation', label:'Foundation'},
  intermediate: {cls:'lv-intermediate', label:'Intermediate'},
  advanced: {cls:'lv-advanced', label:'Advanced'},
  expert: {cls:'lv-expert', label:'Expert'}
};

const tagMap = {
  core: {cls:'tt-core', label:'Core'},
  theory: {cls:'tt-theory', label:'Theory'},
  'hands-on': {cls:'tt-hands-on', label:'Hands-On'},
  tools: {cls:'tt-tools', label:'Tools'},
  advanced: {cls:'tt-advanced', label:'Advanced'},
  research: {cls:'tt-research', label:'Research'}
};

function renderPhase(ph, idx) {
  const lv = levelMap[ph.level] || levelMap.foundation;
  const isOpen = idx === currentPhaseIdx;
  return `
    <div class="phase-block${isOpen ? ' open' : ''}" id="phase-${idx}">
      <div class="phase-header" onclick="togglePhase(${idx})">
        <div class="phase-num">${idx+1}</div>
        <div class="phase-info">
          <div class="phase-name">${ph.name}</div>
          <div class="phase-tagline">${ph.tagline}</div>
        </div>
        <div class="phase-meta">
          <span class="level-badge ${lv.cls}">${lv.label}</span>
        </div>
        <span class="phase-chevron">›</span>
      </div>
      <div class="phase-body">
        <div class="phase-desc">${ph.desc}</div>
        <div class="topics-grid">
          ${ph.topics.map((tp, ti) => renderTopic(tp, idx, ti)).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderTopic(tp, phIdx, tIdx) {
  const tag = tagMap[tp.tag] || {cls:'tt-core', label:tp.tag};
  const masterItems = tp.master.map(m => `<li>${m}</li>`).join('');
  const resChips = tp.res.map(r => `<span class="res-chip">${r}</span>`).join('');
  return `
    <div class="topic-card" id="topic-${phIdx}-${tIdx}">
      <div class="topic-head" onclick="toggleTopic(${phIdx},${tIdx})">
        <span class="topic-name">${tp.name}</span>
        <span class="topic-tag ${tag.cls}">${tag.label}</span>
      </div>
      <div class="topic-body-inner">
        <div class="topic-section">
          <div class="topic-section-label">What to master</div>
          <p class="topic-desc">${tp.desc}</p>
        </div>
        <div class="topic-section">
          <div class="topic-section-label">Mastery checklist</div>
          <ul class="master-list">${masterItems}</ul>
        </div>
        <div class="topic-section">
          <div class="topic-section-label">Resources</div>
          <div class="res-list">${resChips}</div>
        </div>
      </div>
    </div>
  `;
}

function togglePhase(idx) {
  const block = document.getElementById(`phase-${idx}`);
  const isOpen = block.classList.contains('open');
  document.querySelectorAll('.phase-block').forEach(b => b.classList.remove('open'));
  if (!isOpen) { block.classList.add('open'); currentPhaseIdx = idx; }
  else currentPhaseIdx = -1;
  document.querySelectorAll('.phase-nav-item').forEach((el, i) => {
    el.classList.toggle('active-phase', i === currentPhaseIdx);
  });
}

function toggleTopic(phIdx, tIdx) {
  const card = document.getElementById(`topic-${phIdx}-${tIdx}`);
  card.classList.toggle('open');
}

function jumpToPhase(idx) {
  currentPhaseIdx = idx;
  renderMain(DATA[currentArea]);
  renderSidebar(DATA[currentArea]);
  setTimeout(() => {
    const el = document.getElementById(`phase-${idx}`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 50);
}

render();
</script>
</body>
</html>
